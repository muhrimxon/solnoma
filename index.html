<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ойма-ой — Контент Режа</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f4;
    --surface: #ffffff;
    --surface2: #f5f2ec;
    --surface3: #ede9e0;
    --border: #e2dbd0;
    --border2: #d0c9bc;
    --text: #1c1a16;
    --text2: #4a4540;
    --text3: #8a8078;
    --accent: #c0392b;
    --accent-light: #fdf0ee;
    --gold: #c49a1a;
    --gold-light: #fdf8e8;
    --green: #27725a;
    --green-light: #edf7f3;
    --blue: #1e4d8c;
    --blue-light: #eef2fa;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.10), 0 2px 4px rgba(0,0,0,0.07);
    --radius: 8px;
    --radius-sm: 5px;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .masthead {
    background: linear-gradient(135deg, #2c2825 0%, #1a1816 100%);
    padding: 20px 28px 16px;
    text-align: center;
  }

  .masthead-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .masthead h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 8px;
    line-height: 1;
    color: #fff;
    text-transform: uppercase;
  }

  .masthead-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-top: 8px;
    border: none;
    padding: 0;
  }

  .controls {
    display: flex;
    gap: 8px;
    padding: 12px 28px;
    background: var(--surface);
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .controls select, .controls input {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: var(--radius-sm);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .controls select:focus, .controls input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
  }

  .controls input[type="text"] { flex: 1; min-width: 180px; }

  .controls label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 500;
  }

  .stats-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    color: var(--text3);
    overflow-x: auto;
  }

  .stat-item {
    padding: 7px 18px;
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }

  .stat-item strong { color: var(--accent); font-weight: 600; }

  .calendar-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 28px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    background: var(--surface);
  }

  .month-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    padding: 6px 13px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    border-radius: var(--radius-sm);
    white-space: nowrap;
    transition: all 0.15s;
  }

  .month-btn:hover { background: var(--surface2); border-color: var(--border2); }
  .month-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .main-content {
    padding: 20px 28px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .day-section { padding: 16px 0 8px; }

  .day-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .day-number {
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
    background: var(--text);
    color: #fff;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }

  .day-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
  }

  .day-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-weight: 500;
  }

  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 10px;
  }

  .event-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px 12px 16px;
    background: var(--surface);
    position: relative;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .event-card:hover {
    border-color: var(--border2);
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
  }

  .event-card.expanded {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(192,57,43,0.12), var(--shadow-hover);
  }

  .event-type-stripe {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
  }

  .type-bayram { background: var(--gold); }
  .type-tarixiy { background: var(--accent); }
  .type-tugil { background: var(--green); }
  .type-vafot { background: #6b7280; }

  .event-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .type-badge {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 2px 7px;
    font-weight: 600;
    border-radius: 20px;
  }

  .badge-bayram { background: var(--gold-light); color: #8a6910; border: 1px solid #e6c84a; }
  .badge-tarixiy { background: var(--accent-light); color: var(--accent); border: 1px solid #f0a89e; }
  .badge-tugil { background: var(--green-light); color: var(--green); border: 1px solid #a0d4c0; }
  .badge-vafot { background: #1c1a16; color: #ffffff; border: 1px solid #1c1a16; }

  .platform-badge {
    font-size: 9.5px;
    padding: 2px 7px;
    font-weight: 500;
    border-radius: 20px;
  }

  .badge-uzbek { background: var(--green-light); color: var(--green); border: 1px solid #a0d4c0; }
  .badge-world { background: var(--blue-light); color: var(--blue); border: 1px solid #a8c0e8; }

  .event-title {
    font-size: 13px;
    line-height: 1.45;
    color: var(--text);
    font-weight: 500;
  }

  .event-details {
    display: none;
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  .event-card.expanded .event-details { display: block; }

  .event-detail-row {
    font-size: 11.5px;
    color: var(--text3);
    margin-bottom: 4px;
    line-height: 1.5;
  }

  .event-detail-row strong { color: var(--text2); font-weight: 600; }

  .materials-text {
    font-size: 11.5px;
    color: var(--text2);
    background: var(--surface2);
    padding: 8px 10px;
    border-left: 3px solid var(--gold);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin-top: 8px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin: 16px 0;
    display: none;
    box-shadow: var(--shadow);
  }

  .add-form.visible { display: block; }

  .add-form h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    color: var(--text2);
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text3);
    font-weight: 500;
  }

  .form-group input, .form-group select, .form-group textarea {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: var(--radius-sm);
    outline: none;
  }

  .form-group textarea { min-height: 60px; resize: vertical; }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 18px;
    cursor: pointer;
    border: 1px solid var(--text);
    background: var(--text);
    color: #fff;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }

  .btn:hover { background: var(--accent); border-color: var(--accent); }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-outline:hover { background: var(--surface2); }

  .btn-add {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 16px;
    cursor: pointer;
    border: 1.5px dashed var(--border2);
    background: transparent;
    color: var(--text3);
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }

  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text3);
    font-size: 13px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    margin: 16px 0;
  }

  .section-rule { border: none; border-top: 1px solid var(--border); margin: 16px 0 12px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 16px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .section-header h2 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text);
  }

  .no-results {
    padding: 30px;
    text-align: center;
    font-size: 13px;
    color: var(--text3);
    font-style: italic;
  }

  /* Jubilee */
  .event-card.jubilee {
    border-color: #3a7d54;
    background: #f0faf4;
    box-shadow: 0 0 0 1.5px #3a7d54, var(--shadow);
  }

  .event-card.jubilee .event-type-stripe { width: 5px; }

  .jubilee-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 9.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding: 2px 8px;
    background: #3a7d54;
    color: #fff;
    border-radius: 20px;
  }

  .jubilee-badge::before { content: '★'; font-size: 8px; }

  .necha-yil { margin-top: 4px; font-size: 10.5px; color: var(--text3); }
  .event-card.jubilee .necha-yil { color: #2a5e3e; font-weight: 600; }

  .btn-jubilee {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    cursor: pointer;
    border: 1px solid #3a7d54;
    background: transparent;
    color: #3a7d54;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-jubilee:hover, .btn-jubilee.active { background: #3a7d54; color: #fff; }

  .btn-today {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    cursor: pointer;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    border-radius: var(--radius-sm);
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-today:hover, .btn-today.active { background: var(--accent); color: #fff; }

  .btn-yandex {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 5px; border: 1.5px solid #e6b800;
    background: #fff; color: #333; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s; letter-spacing: .3px;
  }
  .btn-yandex:hover, .btn-yandex.active { background: #FFCC00; color: #000; border-color: #FFCC00; }

  .yandex-card { border-left: 4px solid #FFCC00 !important; background: #fffdf0 !important; }
  .yandex-badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700; background: #FFCC00; color: #000; border: none;
  }

  .today-section {
    background: var(--accent-light);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin: 14px 0 0;
    box-shadow: 0 0 0 3px rgba(192,57,43,0.08);
  }

  .today-section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(192,57,43,0.2);
  }

  .today-label {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    background: #fbd9d5;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .today-date-display {
    font-size: 12.5px;
    color: var(--text2);
    font-weight: 500;
  }

  @media (max-width: 600px) {
    .masthead h1 { font-size: 28px; letter-spacing: 4px; }
    .controls { padding: 10px 16px; }
    .main-content { padding: 14px 16px 32px; }
    .calendar-nav { padding: 8px 16px; }
    .events-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-top">
    <span>Медиа редакцияси учун</span>
    <span>Ойма-ой контент режа &#8226; 2023–2024</span>
    <span>988 та воқеа</span>
  </div>
  <h1>ОЙМА-ОЙ</h1>
  <div class="masthead-sub">Саналар бўйича контент-режа &#183; Тарихий воқеалар &#183; Байрамлар &#183; Туғилган кунлар</div>
</header>

<div class="controls">
  <label>Қидирув:</label>
  <input type="text" id="search" placeholder="Мавзу, шахс, сана..." />

  <label>Тури:</label>
  <select id="filter-type">
    <option value="">Барчаси</option>
    <option value="Байрам">Байрам</option>
    <option value="Тарихий воқеа">Тарихий воқеа</option>
    <option value="Туғилган кун">Туғилган кун</option>
    <option value="Вафот этган">Вафот этган</option>
  </select>

  <label>Платформа:</label>
  <select id="filter-platform">
    <option value="">Барчаси</option>
    <option value="UZBEK">Ўзбек</option>
    <option value="WORLD">Дунё</option>
    <option value="Ўзбек">Ўзбек (эски)</option>
  </select>

  <button class="btn" onclick="toggleAddForm()">+ Янги қўшиш</button>
  <button class="btn-today" id="btn-today" onclick="toggleToday()">📅 Бугун</button>
  <button class="btn-jubilee" id="btn-jubilee" onclick="toggleJubilee()">★ Юбилейлар</button>
  <button class="btn-yandex" id="btn-yandex" onclick="toggleYandex()">📚 Яндекс Китоб</button>
</div>

<div class="stats-bar" id="stats-bar"></div>

<nav class="calendar-nav" id="month-nav"></nav>

<div class="add-form" id="add-form">
  <h3>Yangi voqea qo'shish</h3>
  <div class="form-grid">
    <div class="form-group">
      <label>Ой</label>
      <select id="new-oy">
        <option>Февраль</option><option>Март</option><option>Апрель</option>
        <option>Май</option><option>Июнь</option><option>Июль</option>
        <option>Август</option><option>Сентябрь</option><option>Ноябрь</option>
      </select>
    </div>
    <div class="form-group">
      <label>Тури</label>
      <select id="new-turi">
        <option>Байрам</option>
        <option>Тарихий воқеа</option>
        <option>Туғилган кун</option>
        <option>Вафот этган</option>
      </select>
    </div>
    <div class="form-group">
      <label>Сана (масалан: 15 июнь)</label>
      <input type="text" id="new-sana" placeholder="15 июнь" />
    </div>
    <div class="form-group">
      <label>Платформа</label>
      <select id="new-qaerda">
        <option>UZBEK</option>
        <option>WORLD</option>
      </select>
    </div>
    <div class="form-group">
      <label>Йил (ихтиёрий)</label>
      <input type="number" id="new-yil" placeholder="1991" />
    </div>
    <div class="form-group">
      <label>Неча йил аввал</label>
      <input type="text" id="new-necha" placeholder="33" />
    </div>
    <div class="form-group full">
      <label>Мавзу</label>
      <input type="text" id="new-mavzu" placeholder="Воқеа ёки шахс ҳақида мавзу..." />
    </div>
    <div class="form-group full">
      <label>Мавзу бўйича материаллар (ихтиёрий)</label>
      <textarea id="new-materials" placeholder="Ҳавола, изоҳ..."></textarea>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-top:12px;">
    <button class="btn" onclick="addEvent()">Қўшиш</button>
    <button class="btn btn-outline" onclick="toggleAddForm()">Бекор</button>
  </div>
</div>

function calcNechaYil(ev) {
  const yil = ev['ЙИЛ'];
  if (!yil || isNaN(yil)) return null;
  return CURRENT_YEAR - parseInt(yil);
}

function isJubilee(years) {
  if (!years || years <= 0) return false;
  return JUBILEE_INTERVALS.some(interval => years % interval === 0);
}

  if (!years) return '';
  // Find the largest matching interval for display
  const matched = JUBILEE_INTERVALS.filter(i => years % i === 0);
  if (matched.length === 0) return '';
  const largest = matched[matched.length - 1];
  return `${years} йиллик юбилей`;
}

const MONTHS = ['Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Ноябрь'];

let allData = RAW_DATA.filter(d => d['ТУРИ'] && d['МАВЗУ']);
let customData = [];
let currentMonth = null;
let expandedCard = null;

function typeKey(t) {
  if (!t) return 'other';
  if (t === 'Байрам') return 'bayram';
  if (t === 'Тарихий воқеа') return 'tarixiy';
  if (t === 'Туғилган кун') return 'tugil';
  if (t === 'Вафот этган') return 'vafot';
  return 'other';
}

function typeBadge(t) {
  const k = typeKey(t);
  const labels = {bayram:'Байрам', tarixiy:'Тарихий воқеа', tugil:'Туғилган кун', vafot:'Вафот этган', other: t||''};
  return `<span class="type-badge badge-${k}">${labels[k]||t}</span>`;
}

function platformBadge(p) {
  if (!p) return '';
  const isUz = p === 'UZBEK' || p === 'Ўзбек';
  return `<span class="platform-badge ${isUz ? 'badge-uzbek':'badge-world'}">${isUz?'UZ':'WORLD'}</span>`;
}

function extractDayNum(sana) {
  if (!sana) return 99;
  const m = sana.match(/^(\d+)/);
  return m ? parseInt(m[1]) : 99;
}

function renderStats(data) {
  const counts = {};
  data.forEach(d => { counts[d['ТУРИ']] = (counts[d['ТУРИ']]||0) + 1; });
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `
    <div class="stat-item">Жами: <strong>${data.length}</strong></div>
    ${Object.entries(counts).map(([k,v]) => `<div class="stat-item">${k}: <strong>${v}</strong></div>`).join('')}
  `;
}

function renderMonthNav() {
  const nav = document.getElementById('month-nav');
  nav.innerHTML = `<button class="month-btn ${currentMonth===null?'active':''}" onclick="setMonth(null)">Барча ойлар</button>` +
    MONTHS.map(m => `<button class="month-btn ${currentMonth===m?'active':''}" onclick="setMonth('${m}')">${m}</button>`).join('');
}

function setMonth(m) {
  currentMonth = m;
  renderMonthNav();
  renderMain();
}

function renderMain() {
  const data = getFiltered();
  renderStats(data);

  const container = document.getElementById('main-content');

  if (data.length === 0) {
    container.innerHTML = '<div class="no-results">Натижа топилмади. Бошқа фильтр синаб кўринг.</div>';
    return;
  }

  // Group by month then by day
  const byMonth = {};
  data.forEach(d => {
    const oy = d['ОЙ'] || 'Номаълум';
    if (!byMonth[oy]) byMonth[oy] = {};
    const dayKey = d['САНА'] || '?';
    if (!byMonth[oy][dayKey]) byMonth[oy][dayKey] = [];
    byMonth[oy][dayKey].push(d);
  });

  const sortedMonths = MONTHS.filter(m => byMonth[m]);

  let html = '';

  sortedMonths.forEach(month => {
    const days = byMonth[month];
    const sortedDays = Object.keys(days).sort((a,b) => extractDayNum(a) - extractDayNum(b));
    const total = sortedDays.reduce((s,d) => s + days[d].length, 0);

    html += `<div class="section-header">
      <h2>${month}</h2>
      <span style="font-size:11px;font-family:'Inter',sans-serif;color:var(--text3);">${total} та воқеа · ${sortedDays.length} кун</span>
    </div>`;

    sortedDays.forEach(dayKey => {
      const events = days[dayKey];
      const dayNum = extractDayNum(dayKey);
      const dayNumDisplay = dayNum < 90 ? dayNum : '—';

      html += `<div class="day-section">
        <div class="day-header">
          <span class="day-number">${dayNumDisplay}</span>
          <span class="day-label">${dayKey.replace(/^\d+\s*/,'')}</span>
          <span class="day-count">${events.length} та</span>
        </div>
        <div class="events-grid">`;

      events.forEach((ev, i) => {
        const id = `ev-${month}-${dayKey}-${i}`.replace(/\s+/g,'-');
        const k = typeKey(ev['ТУРИ']);
        const hasMaterials = ev['МАВЗУ БЎЙИЧА МАТЕРИАЛЛАР'];
        const yil = ev['ЙИЛ'] ? `${parseInt(ev['ЙИЛ'])} й.` : '';

        // Calculate "how many years ago" dynamically from current year
        const nechaNum = calcNechaYil(ev);
        const necha = nechaNum && nechaNum > 0 ? `${nechaNum} йил аввал` : '';
        const jubilee = nechaNum && isJubilee(nechaNum);
        const jubileeLabel = jubilee ? getJubileeLabel(nechaNum) : '';

        html += `<div class="event-card${jubilee ? ' jubilee' : ''}" id="${id}" onclick="toggleCard('${id}')">
          <div class="event-type-stripe type-${k}"></div>
          <div class="event-meta">
            ${typeBadge(ev['ТУРИ'])}
            ${platformBadge(ev['ҚАЕРДА'])}
            ${yil ? `<span style="font-size:10px;font-family:'Inter',sans-serif;color:var(--text3);">${yil}</span>` : ''}
            ${jubilee ? `<span class="jubilee-badge">${jubileeLabel}</span>` : ''}
          </div>
          <div class="event-title">${ev['МАВЗУ']}</div>
          ${necha ? `<div class="necha-yil">${necha}</div>` : ''}
          <div class="event-details">
            ${yil ? `<div class="event-detail-row"><strong>Йил:</strong> ${parseInt(ev['ЙИЛ'])}</div>` : ''}
            ${necha ? `<div class="event-detail-row"><strong>Муддати:</strong> ${necha}</div>` : ''}
            <div class="event-detail-row"><strong>Платформа:</strong> ${ev['ҚАЕРДА']||'—'}</div>
            ${hasMaterials ? `<div class="materials-text">${ev['МАВЗУ БЎЙИЧА МАТЕРИАЛЛАР']}</div>` : ''}
          </div>
        </div>`;
      });

      html += `</div></div>`;
    });
  });

  container.innerHTML = html;

  // Show today's events panel if todayMode is on
  if (todayMode) {
    renderTodaySection(container);
  }

  // Show Yandex section if yandexMode is on
  if (yandexMode) {
    renderYandexSection(container);
  }
}

function toggleCard(id) {
  const card = document.getElementById(id);
  if (!card) return;
  if (expandedCard && expandedCard !== id) {
    const prev = document.getElementById(expandedCard);
    if (prev) prev.classList.remove('expanded');
  }
  card.classList.toggle('expanded');
  expandedCard = card.classList.contains('expanded') ? id : null;
}

function toggleAddForm() {
  const f = document.getElementById('add-form');
  f.classList.toggle('visible');
  if (f.classList.contains('visible')) f.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function addEvent() {
  const ev = {
    'ОЙ': document.getElementById('new-oy').value,
    'ТУРИ': document.getElementById('new-turi').value,
    'САНА': document.getElementById('new-sana').value,
    'ҚАЕРДА': document.getElementById('new-qaerda').value,
    'ЙИЛ': document.getElementById('new-yil').value || null,
    'НЕЧА ЙИЛ': document.getElementById('new-necha').value || null,
    'МАВЗУ': document.getElementById('new-mavzu').value,
    'МАВЗУ БЎЙИЧА МАТЕРИАЛЛАР': document.getElementById('new-materials').value || null,
  };
  if (!ev['МАВЗУ']) { alert('Мавзу киритинг!'); return; }
  customData.push(ev);
  toggleAddForm();
  setMonth(ev['ОЙ']);
  ['new-sana','new-yil','new-necha','new-mavzu','new-materials'].forEach(id => document.getElementById(id).value = '');
}

// Search on input
document.getElementById('search').addEventListener('input', renderMain);
document.getElementById('filter-type').addEventListener('change', renderMain);
document.getElementById('filter-platform').addEventListener('change', renderMain);

// Today mode
let todayMode = false;
let jubileeMode = false;
let yandexMode = false;

// Month names in Uzbek/Russian mapping to numbers
const MONTH_NUM = {
  'январь':1,'февраль':2,'февраль':2,'феврель':2,'март':3,'апрель':4,'май':5,
  'июнь':6,'июль':7,'август':8,'сентябрь':9,'октябрь':10,'ноябрь':11,'декабрь':12
};

function getTodayDayMonth() {
  const now = new Date();
  return { day: now.getDate(), month: now.getMonth() + 1 };
}

function sanaMatchesToday(sana) {
  if (!sana) return false;
  const s = sana.toLowerCase();
  const { day, month } = getTodayDayMonth();
  // Extract day number from sana string
  const dayMatch = s.match(/^(\d+)/);
  if (!dayMatch) return false;
  const sanaDay = parseInt(dayMatch[1]);
  if (sanaDay !== day) return false;
  // Check month name in sana
  for (const [name, num] of Object.entries(MONTH_NUM)) {
    if (s.includes(name) && num === month) return true;
  }
  return false;
}

function sanaMatchesMonth(sana, monthName) {
  if (!sana) return false;
  const s = sana.toLowerCase();
  // Find month number for monthName
  const monthNum = MONTH_NUM[monthName.toLowerCase()];
  if (!monthNum) return false;
  for (const [name, num] of Object.entries(MONTH_NUM)) {
    if (s.includes(name) && num === monthNum) return true;
  }
  return true; // if sana doesn't have month name, it belongs to the section month
}

function toggleToday() {
  todayMode = !todayMode;
  jubileeMode = false;
  yandexMode = false;
  document.getElementById('btn-today').classList.toggle('active', todayMode);
  document.getElementById('btn-jubilee').classList.remove('active');
  document.getElementById('btn-yandex').classList.remove('active');
  if (todayMode) {
    // Switch to current month
    const now = new Date();
    const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const curMonthName = monthNames[now.getMonth()];
    // Find matching month in our list
    const matched = MONTHS.find(m => m.toLowerCase() === curMonthName.toLowerCase());
    if (matched) { currentMonth = matched; }
  }
  renderMonthNav();
  renderMain();
}

function toggleJubilee() {
  jubileeMode = !jubileeMode;
  todayMode = false;
  yandexMode = false;
  document.getElementById('btn-jubilee').classList.toggle('active', jubileeMode);
  document.getElementById('btn-today').classList.remove('active');
  document.getElementById('btn-yandex').classList.remove('active');
  renderMain();
}

function toggleYandex() {
  yandexMode = !yandexMode;
  todayMode = false;
  jubileeMode = false;
  document.getElementById('btn-yandex').classList.toggle('active', yandexMode);
  document.getElementById('btn-today').classList.remove('active');
  document.getElementById('btn-jubilee').classList.remove('active');
  renderMain();
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  const fType = document.getElementById('filter-type').value;
  const fPlat = document.getElementById('filter-platform').value;
  const combined = [...allData, ...customData];

  return combined.filter(d => {
    if (currentMonth && d['ОЙ'] !== currentMonth) return false;
    if (fType && d['ТУРИ'] !== fType) return false;
    if (fPlat && d['ҚАЕРДА'] !== fPlat) return false;
    if (jubileeMode) {
      const n = calcNechaYil(d);
      if (!n || !isJubilee(n)) return false;
    }
    if (search) {
      const haystack = [d['МАВЗУ'], d['САНА'], d['ЙИЛ'], d['МАВЗУ БЎЙИЧА МАТЕРИАЛЛАР']].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
}

function renderYandexSection(container) {
  const byMonth = {};
  YANDEX_AUTHORS.forEach(a => {
    if (!byMonth[a.oy]) byMonth[a.oy] = [];
    byMonth[a.oy].push(a);
  });

  const sortedMonths = MONTHS.filter(m => byMonth[m]);

  let html = `<div class="today-section" style="border-color:#FFCC00;background:#fffdf0;margin-top:16px;">
    <div style="font-weight:700;font-size:15px;margin-bottom:12px;color:#000;">
      📚 Яндекс Китоб — Ўзбекчага таржима қилинган асарлар муаллифлари
    </div>`;

  sortedMonths.forEach(month => {
    const authors = byMonth[month].sort((a,b) => {
      const da = parseInt(a.sana) || 0;
      const db = parseInt(b.sana) || 0;
      return da - db;
    });

    html += `<div style="margin-bottom:12px;">
      <div style="font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">${month}</div>
      <div class="events-grid">`;

    authors.forEach((a, i) => {
      const id = `yandex-${month}-${i}`.replace(/\s+/g,'-');
      const nechaYil = CURRENT_YEAR - a.yil;
      const jubilee = isJubilee(nechaYil);
      const jubileeLabel = jubilee ? getJubileeLabel(nechaYil) : '';

      html += `<div class="event-card yandex-card${jubilee ? ' jubilee' : ''}" id="${id}" onclick="toggleCard('${id}')">
        <div class="event-type-stripe" style="background:#FFCC00;"></div>
        <div class="event-meta">
          <span class="yandex-badge">📚 Яндекс</span>
          ${jubilee ? `<span class="jubilee-badge">${jubileeLabel}</span>` : ''}
        </div>
        <div class="event-title">${a.muallif} туғилган кун</div>
        <div class="necha-yil">${a.sana}, ${a.yil} · ${nechaYil} йил аввал</div>
        <div class="event-details">
          <div class="event-detail-row"><strong>Туғилган сана:</strong> ${a.sana}, ${a.yil}</div>
          <div class="event-detail-row"><strong>Муддати:</strong> ${nechaYil} йил аввал</div>
          <div class="event-detail-row"><strong>Манба:</strong> Яндекс Китоб</div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;

  const yandexDiv = document.createElement('div');
  yandexDiv.innerHTML = html;
  container.prepend(yandexDiv.firstChild);
}

function renderTodaySection(container) {
  const { day, month } = getTodayDayMonth();
  const monthNames = ['','Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const combined = [...allData, ...customData];

  // Find today's events by checking sana field for today's day+month
  // Since sana might say "23 март", we match day number AND current month section
  const todayEvents = combined.filter(d => {
    if (!d['САНА']) return false;
    const sana = d['САНА'].toLowerCase();
    const dayMatch = sana.match(/^(\d+)/);
    if (!dayMatch || parseInt(dayMatch[1]) !== day) return false;
    // Check month via section (ОЙ field) mapped to month number
    const oyNum = MONTH_NUM[d['ОЙ'] ? d['ОЙ'].toLowerCase() : ''];
    return oyNum === month;
  });

  if (todayEvents.length === 0) return;

  const dateStr = `${day} ${monthNames[month]}`;
  let html = `<div class="today-section">
    <div class="today-section-header">
      <span class="today-label">Бугун</span>
      <span class="today-date-display">${dateStr} — ${todayEvents.length} та воқеа</span>
    </div>
    <div class="events-grid">`;

  todayEvents.forEach((ev, i) => {
    const id = `today-ev-${i}`;
    const k = typeKey(ev['ТУРИ']);
    const hasMaterials = ev['МАВЗУ БЎЙИЧА МАТЕРИАЛЛАР'];
    const yil = ev['ЙИЛ'] ? `${parseInt(ev['ЙИЛ'])} й.` : '';
    const nechaNum = calcNechaYil(ev);
    const necha = nechaNum && nechaNum > 0 ? `${nechaNum} йил аввал` : '';
    const jubilee = nechaNum && isJubilee(nechaNum);
    const jubileeLabel = jubilee ? getJubileeLabel(nechaNum) : '';

    html += `<div class="event-card${jubilee ? ' jubilee' : ''}" id="${id}" onclick="toggleCard('${id}')">
      <div class="event-type-stripe type-${k}"></div>
      <div class="event-meta">
        ${typeBadge(ev['ТУРИ'])}
        ${platformBadge(ev['ҚАЕРДА'])}
        ${yil ? `<span style="font-size:10px;font-family:'Inter',sans-serif;color:var(--text3);">${yil}</span>` : ''}
        ${jubilee ? `<span class="jubilee-badge">${jubileeLabel}</span>` : ''}
      </div>
      <div class="event-title">${ev['МАВЗУ']}</div>
      ${necha ? `<div class="necha-yil">${necha}</div>` : ''}
      <div class="event-details">
        ${yil ? `<div class="event-detail-row"><strong>Йил:</strong> ${parseInt(ev['ЙИЛ'])}</div>` : ''}
        ${necha ? `<div class="event-detail-row"><strong>Муддати:</strong> ${necha}</div>` : ''}
        <div class="event-detail-row"><strong>Платформа:</strong> ${ev['ҚАЕРДА']||'—'}</div>
        ${hasMaterials ? `<div class="materials-text">${ev['МАВЗУ БЎЙИЧА МАТЕРИАЛЛАР']}</div>` : ''}
      </div>
    </div>`;
  });

  html += `</div></div>`;
  container.insertAdjacentHTML('afterbegin', html);
}

renderMonthNav();
renderMain();
</script>
